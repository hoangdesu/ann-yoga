name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Set global environment variables
env:
  # Opt-in to Node 24 for actions to suppress deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Define the base path for static site deployment on GitHub Pages
  BASE_PATH: "/${{ github.event.repository.name }}"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    # Fix: SvelteKit projects require sync to generate the internal types and tsconfig.
    - name: Sync SvelteKit types
      run: pnpm exec svelte-kit sync

    - name: Check types and lint
      run: pnpm check

    - name: Build
      run: pnpm build
      env:
        # Pass the BASE_PATH to the SvelteKit build process
        BASE_PATH: "/${{ github.event.repository.name }}"

    - name: Disable Jekyll
      run: touch build/.nojekyll

    # Deployment for static site (e.g. GitHub Pages)
    - name: Upload artifact for deployment
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v3
      with:
        path: build/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
